# Production overlay pipeline for the boat1 stream.
# Edit any sinks.<name>.enabled or scoreboard.enabled flag to disable that
# branch / overlay without code changes.

source:
  uri: srt://mediamtx:8890?streamid=read:boat1
  latency_ms: 200
  wait_for:
    api_url: http://mediamtx:8888
    path_name: boat1
    poll_interval_seconds: 2
    request_timeout_seconds: 2
    timeout_seconds: null   # wait forever, like the original

video_encode:
  overlay_path: /overlays/placeholder.svg
  encoder:
    bitrate_kbps: 5000
    keyframe_interval: 30
    bframes: 0
    tune: zerolatency
    speed_preset: veryfast

scoreboard:
  enabled: true
  scroll_speed_px_per_sec: 120.0
  strip_height_px: 60
  font_size_pt: 32.0
  font_family: "DejaVu Sans"
  background_alpha: 0.65
  entry_separator: "   |   "
  text_color_rgb: [1.0, 1.0, 1.0]
  anglers:
    - rank: 1
      name: "D. Johnson"
      points: 22
    - rank: 2
      name: "E. Harold"
      points: 20
    - rank: 3
      name: "M. Tate"
      points: 18
    - rank: 4
      name: "C. Vega"
      points: 15
    - rank: 5
      name: "A. Shields"
      points: 12

browser_overlay:
  enabled: true              # opt-in; flip to true to composite the browser overlay
  display_name: ":99"          # must match Xvfb in Pypeline/supervisord.conf
  framerate: 30
  capture_endx: 1919           # width  - 1
  capture_endy: 1079           # height - 1

mux:
  alignment: 7

sinks:
  default_queue:
    max_buffers: 0
    max_time_seconds: 10
    max_bytes: 16777216    # 16 MiB

  srt_publisher:
    enabled: true
    uri: srt://mediamtx:8890?streamid=publish:boat1-processed
    latency_ms: 200

  file_recorder:
    enabled: true
    location: /logs/output.ts

  srt_listener:
    enabled: true
    port: 8891
    stream_id: boat1-processed
    latency_ms: 2000
    wait_for_connection: false

  rtsp_bridge:
    enabled: true
    mount_path: /boat1-processed
    appsink:
      max_buffers: 200
      drop: false

rtsp_server:
  port: 8554
