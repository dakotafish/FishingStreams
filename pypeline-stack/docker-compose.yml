# Pypeline deployment stack: mediamtx + the Pypeline gstreamer service.
#
# Build context for the gstreamer service is ../Pypeline (the code lives
# there; this directory only owns deployment concerns: mediamtx, configs,
# overlays, logs).
#
# NOTE: ports 8890, 8888, 8889, 8891, 8554 collide with the MVP stack.
# Only run one stack at a time (docker compose down in the other first).

services:
  mediamtx:
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
    container_name: pypeline-mediamtx
    restart: unless-stopped
    ports:
      - "8890:8890/udp"   # SRT (phone pushes here; OBS pulls from here)
      - "8888:8888/tcp"   # HTTP API (/v3/paths/list diagnostics)
      - "8889:8889/tcp"   # HLS preview (http://localhost:8889/boat1/index.m3u8)
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
      - ./logs/mediamtx:/logs

  gstreamer:
    build:
      context: ../Pypeline
      dockerfile: Dockerfile
    container_name: pypeline-gstreamer
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "8891:8891/udp"   # SRT listener for OBS (direct, bypasses mediamtx)
      - "8554:8554/tcp"   # RTSP diagnostic server (in-process, bypasses mediamtx)
    environment:
      - PYTHONUNBUFFERED=1
      - GST_DEBUG=3
      - GST_DEBUG_FILE=/logs/gst.log
      - GST_DEBUG_NO_COLOR=1
    volumes:
      - ./logs/gstreamer:/logs
      - ./overlays:/overlays:ro
